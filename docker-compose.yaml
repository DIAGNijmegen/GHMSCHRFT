services:
  ghmschrft:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1986:1986"
    command: uvicorn api:app --host 0.0.0.0 --port 1986
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
